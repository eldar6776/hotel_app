services:
  postgres:
    image: postgres:18
    container_name: hotelpro-postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: hotelpro
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotel_dev_2026}
    volumes:
      - hotelpro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel -d hotelpro"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - db-network

  backup:
    image: prodrigestivill/postgres-backup-local:18
    container_name: hotelpro-backup
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: hotelpro
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotel_dev_2026}
      BACKUP_DIR: /backups
      BACKUP_KEEP_DAYS: 30
      SCHEDULE: "@daily"
    volumes:
      - ./backups:/backups
    restart: unless-stopped
    networks:
      - db-network

volumes:
  hotelpro_pgdata:

networks:
  db-network:
    driver: bridge
